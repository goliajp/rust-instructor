[package]
name = "instructors"
version = "0.1.0"
edition = "2021"
rust-version = "1.91"
description = "Type-safe structured output extraction from LLMs. The Rust instructor."
license = "MIT"
repository = "https://github.com/goliajp/airs"
homepage = "https://github.com/goliajp/airs"
documentation = "https://docs.rs/instructors"
keywords = ["llm", "openai", "anthropic", "structured-output", "instructor"]
categories = ["api-bindings", "data-structures"]
readme = "README.md"

[dependencies]
serde = { version = "1", features = ["derive"] }
serde_json = "1"
schemars = "0.8"
reqwest = { version = "0.12", default-features = false, features = ["json", "rustls-tls"] }
thiserror = "2"
tiktoken = { path = "../tiktoken", version = "2.1", optional = true }

[features]
default = ["cost-tracking"]
cost-tracking = ["tiktoken"]

[dev-dependencies]
tokio = { version = "1", features = ["macros", "rt-multi-thread"] }
